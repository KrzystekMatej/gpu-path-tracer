
scripts:
    - phase: Awake
      name: AwakeCameraController
    - phase: Update
      name: UpdateCameraController
scene:
    # Camera
    - components:
        - type: Transform
          translation: [0.0, 0.0, 3.0]
          target: [0.0, 0.0, 0.0]
          scale: [1.0, 1.0, 1.0]
        - type: Camera
          fov-y: 45.0
          near-plane: 0.1
          far-plane: 100.0
        - type: CameraController
          speed: 10.0
          sensitivity: 0.01
    # Lights
    - components:
        - type: Transform
          translation: [-10.0, 10.0, 10.0]
          euler-degrees: [0.0, 0.0, 0.0]
          scale: [1.0, 1.0, 1.0]
