scripts:
    - phase: Awake
      name: AwakeCameraController
    - phase: Update
      name: UpdateCameraController
scene:
    - components:
        - type: Transform
          translation: [0.0, 0.0, 0.0]
          euler-degrees: [0.0, 0.0, 0.0]
          scale: [1.0, 1.0, 1.0]
        - type: Model
          path: Models/BreakfastRoom/BreakfastRoom.obj
    - components:
        - type: Transform
          translation: [0.0, 0.0, 0.0]
          euler-degrees: [0.0, 0.0, 0.0]
          scale: [1.0, 1.0, 1.0]  
        - type: Camera
          fov-y: 40.0
          near-plane: 0.1
          far-plane: 10000.0
        - type: CameraController
          speed: 10.0
          sensitivity: 0.005
  